<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPC Tournament Director</title>
<style>
/* Offline font stack — Rajdhani/Barlow replaced with system equivalents when offline */
@import url('fonts/fonts.css');
</style>
<script src="lib/react.min.js"></script>
<script src="lib/react-dom.min.js"></script>
<script src="lib/babel.min.js"></script>
<script>
/* ═══════════════════════════════════════════════
   SOUND ENGINE — Web Audio API (no files needed)
   ═══════════════════════════════════════════════ */
const SoundEngine = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function beep(freq, duration, type='sine', vol=0.3, delay=0) {
    try {
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime + delay);
      gain.gain.setValueAtTime(vol, c.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + duration);
      osc.start(c.currentTime + delay);
      osc.stop(c.currentTime + delay + duration);
    } catch(e) {}
  }
  return {
    // 3 warning beeps at 5 seconds remaining
    levelWarning() {
      for (let i = 0; i < 3; i++) beep(880, 0.12, 'square', 0.25, i * 0.2);
    },
    // Long tone + break announcement
    levelEnd() {
      beep(660, 0.15, 'square', 0.35, 0);
      beep(880, 0.15, 'square', 0.35, 0.18);
      beep(1100, 0.5, 'sine', 0.3, 0.36);
    },
    // Break ending — cheerful ascending
    breakEnd() {
      [523, 659, 784, 1047].forEach((f, i) => beep(f, 0.18, 'sine', 0.28, i * 0.12));
    },
    // New level — two quick pings
    levelChange() {
      beep(880, 0.1, 'sine', 0.25, 0);
      beep(1100, 0.25, 'sine', 0.2, 0.12);
    },
    // Bust confirmation
    bust() {
      beep(300, 0.1, 'sawtooth', 0.15, 0);
      beep(200, 0.2, 'sawtooth', 0.1, 0.12);
    },
    // Registration ping
    register() {
      beep(880, 0.08, 'sine', 0.15, 0);
      beep(1100, 0.12, 'sine', 0.12, 0.1);
    }
  };
})();

/* ═══════════════════════════════════════════════
   ELECTRON API BRIDGE
   ═══════════════════════════════════════════════ */
const isElectron = typeof window.electronAPI !== 'undefined';

// Server info banner
let serverInfo = null;
if (isElectron) {
  window.electronAPI.onServerReady((info) => {
    serverInfo = info;
    // Notify the React app
    window.dispatchEvent(new CustomEvent('spc-server-ready', { detail: info }));
  });
  window.electronAPI.onFloorAction((action) => {
    window.dispatchEvent(new CustomEvent('spc-floor-action', { detail: action }));
  });
  window.electronAPI.getServerInfo().then(info => {
    if (info && info.ip) {
      serverInfo = info;
      window.dispatchEvent(new CustomEvent('spc-server-ready', { detail: info }));
    }
  });
}

// Override download — use native dialog in Electron
if (isElectron) {
  const origCreateElement = document.createElement.bind(document);
  document.createElement = function(tag) {
    const el = origCreateElement(tag);
    if (tag.toLowerCase() === 'a') {
      const origClick = el.click.bind(el);
      el.click = function() {
        if (el.download && el.href && el.href.startsWith('blob:')) {
          // Intercept file download
          const filename = el.download;
          fetch(el.href).then(r=>r.text()).then(async content => {
            const result = await window.electronAPI.showSaveDialog({
              defaultPath: filename,
              filters: [{ name: 'JSON', extensions: ['json'] }]
            });
            if (!result.canceled && result.filePath) {
              await window.electronAPI.writeFile(result.filePath, content);
            }
          });
          URL.revokeObjectURL(el.href);
        } else {
          origClick();
        }
      };
    }
    return el;
  };
}
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.brand-name{font-size:16px;font-weight:700;color:#b2d4ba;margin-top:5px;line-height:1.35}
.brand-status{font-size:12px;color:#7aaa82;margin-top:4px;font-family:'Rajdhani',sans-serif;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.brand-status.running{color:var(--accent,#3dba6f)}
.brand-status.complete{color:#c8973a}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border-radius:7px;border:none;background:none;color:#7aaa82;font-size:13px;font-weight:500;font-family:'Barlow',sans-serif;cursor:pointer;margin-bottom:2px;transition:.15s;text-align:left}

.sf-btn:hover{border-color:#3dba6f;color:#3dba6f}
.sf-btn.display{border-color:#c8973a20;color:#c8973a}
.sf-btn.display:hover{border-color:#c8973a;color:#c8973a;background:#120f07}

.home-inner{min-height:100%;display:flex;flex-direction:column;padding:36px 40px}

.home-title{font-family:'Rajdhani',sans-serif;font-size:44px;font-weight:700;color:#e4f0e8;line-height:1;margin-bottom:32px}

.setup-body{display:flex;flex:1;overflow:hidden}
.setup-left{width:350px;flex-shrink:0;padding:24px 28px;border-right:1px solid #152018;overflow-y:auto}
.setup-right{flex:1;padding:24px 28px;overflow-y:auto}
.section-title{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent,#3dba6f);margin-bottom:14px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#7abf8a;margin-bottom:6px}

.flight-selector{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:4px}

.seat-empty{color:#2a4a35;font-style:italic}
/* PAYOUTS */
.payouts-view{flex:1;overflow-y:auto;padding:18px 22px}
.payout-stats{display:flex;gap:10px;margin-bottom:18px}
.pstat{background:#0b1610;border:1px solid #152018;border-radius:8px;padding:12px 16px;flex:1}
.pstat-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#2a4a35;margin-bottom:4px}
.pstat-val{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:#c8973a}
.payout-table{width:100%;border-collapse:collapse;font-size:13px}
.payout-table th{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#3dba6f;padding:8px 14px;border-bottom:1px solid #152018;text-align:left;font-weight:600}
.payout-table td{padding:9px 14px;border-bottom:1px solid #0a1412;color:#b2d4ba}
.payout-table tr:nth-child(1) td{color:#f0c040;font-size:14px;font-weight:600}
.payout-table tr:nth-child(2) td{color:#c8d0d8}
.payout-table tr:nth-child(3) td{color:#c87a3a}
/* DISPLAY MODE (separate window) */
.display-page{position:fixed;inset:0;background:#020806;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.d-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:5px;color:#3dba6f;text-transform:uppercase;margin-bottom:18px}
.d-level{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:600;letter-spacing:3px;color:#3dba6f;text-transform:uppercase;margin-bottom:4px}
.d-level.break{color:#c8973a}
.d-note{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#c8973a60;margin-bottom:6px}
.d-clock{font-family:'Rajdhani',sans-serif;font-size:160px;font-weight:700;color:#e4f0e8;line-height:1;letter-spacing:-4px;margin-bottom:18px}
.d-clock.warn{color:#c8973a}
.d-clock.danger{color:#e05a5a;animation:blink 1s ease-in-out infinite}
.d-blinds{display:flex;gap:44px;margin-bottom:24px;align-items:flex-end}
.d-blind{text-align:center}
.d-blind-lbl{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#2a4a35;margin-bottom:5px}
.d-blind-val{font-family:'Rajdhani',sans-serif;font-size:50px;font-weight:700;color:#e4f0e8}
.d-next{background:#0b1610;border:1px solid #152018;border-radius:7px;padding:10px 26px;font-size:13px;color:#3a5a42;margin-bottom:26px;text-align:center}
.d-next strong{color:#b2d4ba;font-family:'Rajdhani',sans-serif}
.d-stats{display:flex;gap:52px}
.d-stat{text-align:center}
.d-stat-lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#2a4a35;margin-bottom:4px}
.d-stat-val{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;color:#c8973a}
.d-blind-sep{font-size:28px;color:#152018;padding-bottom:6px}
.clock-fs{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;position:relative;overflow:hidden}
.fs-name{font-size:1.8vw;color:#3dba6f;letter-spacing:.4em;text-transform:uppercase;margin-bottom:.5vh;font-weight:600}
.fs-level{font-size:2.6vw;letter-spacing:.25em;text-transform:uppercase;margin-bottom:.4vh;font-weight:700}
.fs-note{font-size:1.4vw;color:#c8973a60;letter-spacing:.2em;margin-bottom:.4vh}
.fs-clock{font-size:22vw;font-weight:700;line-height:1;letter-spacing:-.03em;margin-bottom:1.5vh;transition:color .4s}
.fs-blinds{display:flex;gap:4vw;align-items:flex-end;margin-bottom:2.5vh}
.fs-blind{text-align:center}
.fs-blind-lbl{font-size:1.2vw;color:rgba(255,255,255,0.45);letter-spacing:.25em;text-transform:uppercase;margin-bottom:.4vh}
.fs-blind-val{font-size:5.5vw;color:#e4f0e8;font-weight:700}
.fs-next{font-size:1.7vw;color:#7aaa82;letter-spacing:.04em;margin-bottom:3vh;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:.6vh 2vw;text-align:center}
.fs-next span{color:#b2d4ba;font-weight:600}
.fs-stats{position:absolute;left:3vw;top:2vh;bottom:2vh;display:flex;flex-direction:column;align-items:center;gap:2.5vh;padding:0 1.8vw;white-space:nowrap;z-index:5}
.fs-stats-inner{flex:1;display:flex;flex-direction:column;justify-content:center;gap:2.5vh;padding:2vh 0}
.fs-stat{text-align:center}
.fs-stat-lbl{font-size:1.0vw;color:rgba(255,255,255,0.5);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.3vh;font-weight:600}
.fs-stat-val{font-size:2.6vw;font-weight:700;font-family:'Rajdhani',sans-serif}
.ctx-menu{position:fixed;background:#0d1a10;border:1px solid #1e3a26;border-radius:9px;padding:6px;min-width:190px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.7);animation:ctxIn .1s ease}
@keyframes ctxIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.ctx-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'Barlow',sans-serif;color:#b2d4ba;transition:.12s;white-space:nowrap}
.ctx-item:hover{background:#152018;color:#e4f0e8}
.ctx-item.danger:hover{background:#2a1212;color:#e05a5a}
.ctx-item .ctx-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.ctx-sep{height:1px;background:#152018;margin:4px 6px}
.ctx-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#2a4a35;padding:6px 13px 2px;font-family:'Barlow',sans-serif}
.fs-btn{background:#0b1610;border:1px solid #1a2e22;color:#527a5c;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;transition:.15s;white-space:nowrap}
.fs-btn:hover{border-color:#3dba6f;color:#3dba6f}
.clock-outer:-webkit-full-screen{background:#020806}
.clock-outer:fullscreen{background:#020806}
.d-waiting{font-family:'Rajdhani',sans-serif;font-size:22px;color:#2a4a35;letter-spacing:3px;text-transform:uppercase}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:5000}
.modal{background:#0b1610;border:1px solid #1a2e22;border-radius:11px;padding:26px;width:440px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:#e4f0e8;margin-bottom:4px}
.modal-sub{font-size:11px;color:#3a5a42;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.back-btn-small{background:none;border:1px solid #1a2e22;color:#527a5c;padding:6px 13px;border-radius:5px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;transition:.15s}
.back-btn-small:hover{border-color:#3dba6f;color:#3dba6f}
.reg-board-wrap{margin-bottom:10px}
.reg-board-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#09140b;border:1px solid #152018;border-radius:7px;cursor:pointer;transition:.15s}
.reg-board-header:hover{border-color:#1e3a26}
.reg-board-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent,#3a5a42);opacity:.6}
.reg-board-stats{font-size:11px;color:#2a4a35}
.reg-board-grid{display:flex;flex-wrap:wrap;gap:2px;padding:10px;max-height:158px;overflow-y:auto;background:#07100a;border:1px solid #152018;border-top:none;border-radius:0 0 7px 7px}
.reg-num{width:34px;height:22px;border-radius:3px;border:1px solid #152018;font-size:10px;font-family:'Barlow',sans-serif;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.1s;background:#0b1610;color:#2a4a35}
.reg-num:hover:not(:disabled){border-color:#3dba6f;color:#3dba6f;background:#0f1e13}
.reg-num.is-active{background:#112016;border-color:#3dba6f40;color:#3dba6f;cursor:default}
.reg-num.is-busted{background:#140a0a;border-color:#3a202040;color:#5a3030;cursor:default}


/* Electron-specific styles */
.electron-bar{position:fixed;top:0;left:0;right:0;height:22px;background:#04080a;z-index:99999;-webkit-app-region:drag;display:flex;align-items:center;justify-content:flex-end;padding:0 8px}
.electron-bar-content{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#1a3a22;-webkit-app-region:no-drag}
.floor-qr{position:fixed;bottom:80px;right:16px;background:#0b1610;border:1px solid #1a2e22;border-radius:8px;padding:10px 14px;z-index:100;font-size:11px;color:#527a5c;text-align:center;cursor:pointer}
.floor-qr:hover{border-color:#3dba6f;color:#3dba6f}
.floor-url{font-size:12px;color:#3dba6f;font-weight:600;margin-top:3px;word-break:break-all}
.floor-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:6000;display:flex;align-items:center;justify-content:center}
.floor-modal{background:#0b1610;border:1px solid #1a2e22;border-radius:12px;padding:28px;width:380px;text-align:center}

/* ==== REGISTER TAB ==== */
.reg-wrap{padding:28px 32px;max-width:860px;margin:0 auto}
.reg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.reg-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#b2d4ba;letter-spacing:.5px}
.reg-mode-row{display:flex;align-items:center;gap:10px}
.reg-mode-label{font-size:13px;color:#7aaa82;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.mode-toggle{display:flex;border:1px solid #1a2e22;border-radius:6px;overflow:hidden}
.mode-btn{padding:6px 16px;font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer;background:transparent;border:none;color:#527a5c;transition:.15s}
.mode-btn.active{background:var(--accent,#c8973a);color:#0a0a0a}
.scan-box{background:#060e09;border:2px solid #1a2e22;border-radius:10px;padding:20px 24px;margin-bottom:20px;transition:.15s}
.scan-box:focus-within{border-color:var(--accent,#c8973a)}
.scan-label{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#7aaa82;margin-bottom:8px;font-weight:600}
.scan-input{width:100%;background:transparent;border:none;outline:none;font-size:16px;color:#e8f0ea;font-family:'Barlow',sans-serif;caret-color:var(--accent,#c8973a)}
.scan-input::placeholder{color:#2a4a35}
.scan-hint{font-size:13px;color:#5a8a6a;margin-top:6px}
.reg-info-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.reg-info-card{flex:1;min-width:140px;background:#060e09;border:1px solid #1a2e22;border-radius:8px;padding:12px 14px}
.reg-info-lbl{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#7aaa82;margin-bottom:5px;font-weight:600}
.reg-info-val{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:#e4f0e8}
.reg-info-val.warn{color:#c8973a}
.reg-info-val.ok{color:#3dba6f}
.reg-info-val.closed{color:#8a4040}
.reentry-badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.5px}
.reentry-badge.open{background:#0b2014;color:#3dba6f;border:1px solid #1a3a22}
.reentry-badge.closed{background:#1a0a0a;color:#8a4040;border:1px solid #3a1a1a}
.reg-log{background:#060e09;border:1px solid #1a2e22;border-radius:10px;overflow:hidden}
.reg-log-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #1a2e22}
.reg-log-title{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#7aaa82;font-weight:600}
.reg-log-list{max-height:340px;overflow-y:auto}
.reg-log-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid #0e1a12;transition:.12s}
.reg-log-row:last-child{border-bottom:none}
.reg-log-row:hover{background:#0b1610}
.reg-log-row.dup{background:#1a1004}
.reg-log-num{font-size:11px;color:#3a5a42;width:28px;text-align:right;flex-shrink:0}
.reg-log-name{flex:1;font-size:14px;color:#b2d4ba;font-weight:500}
.reg-log-seat{font-size:13px;color:#3dba6f;white-space:nowrap;font-weight:600}
.reg-log-seat.unassigned{color:#c8973a}
.reg-log-time{font-size:11px;color:#7aaa82;white-space:nowrap;font-weight:500}
.reg-log-badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.5px}
.reg-log-badge.dup{background:#1a0a0a;color:#c87a40;border:1px solid #3a2010}
.reg-log-badge.reentry{background:#0d0816;color:#9b7bce;border:1px solid #2a1a40}
.unassigned-queue{background:#060e09;border:1px solid #2a1c06;border-radius:10px;margin-bottom:16px;overflow:hidden}
.uq-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #2a1c06;background:#0f0c04}
.uq-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#c8973a}
.uq-row{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid #1a1204}
.uq-row:last-child{border-bottom:none}
.uq-name{flex:1;font-size:13px;color:#e8d8a0}
.uq-btn{padding:5px 14px;border:1px solid #2a1c06;border-radius:4px;background:transparent;color:#c8973a;font-size:11px;cursor:pointer;transition:.15s}
.uq-btn:hover{background:#c8973a;color:#0a0a0a}
.floor-modal-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:#e4f0e8;margin-bottom:6px}
.floor-modal-sub{font-size:12px;color:#3a5a42;margin-bottom:20px}
.floor-url-big{font-size:18px;font-weight:700;color:#3dba6f;background:#09140b;border:1px solid #1a2e22;border-radius:7px;padding:12px 16px;margin-bottom:16px;word-break:break-all;letter-spacing:.5px}
</style>

function getPayouts(entries, prizePool) {

  return PAYOUT_DATA[key].map((pct,i)=>({position:i+1,pct,amount:Math.floor((pct/100)*prizePool/100)*100}));

function findSeat(players, maxTables, seatsPerTable, startTable, seatLocks) {
  startTable=startTable||1; seatLocks=seatLocks||{};
  const active = players.filter(p=>p.status==='active');
  const counts = {};
  for(let i=0;i<maxTables;i++) counts[startTable+i]=0;
  active.forEach(p=>{ if(p.tableNum!==null&&p.tableNum!==undefined&&counts[p.tableNum]!==undefined) counts[p.tableNum]=(counts[p.tableNum]||0)+1; });
  const tables=Object.keys(counts).map(Number)
    .filter(t=>counts[t]<seatsPerTable)
    .sort((a,b)=>counts[a]!==counts[b]?counts[a]-counts[b]:a-b);
  if(!tables.length) return{tableNum:null,seatNum:null};
  for(let ti=0;ti<tables.length;ti++){
    const tNum=tables[ti];
    for(let s=1;s<=seatsPerTable;s++){
      const lk=seatLocks[tNum+'-'+s];
      if(lk==='reg'||lk==='all') continue;
      if(!active.find(p=>p.tableNum===tNum&&p.seatNum===s)) return{tableNum:tNum,seatNum:s};
    }
  }
  return{tableNum:null,seatNum:null};
}

// QR parser — boarding pass string is semicolon-delimited; name is at index 3
function countryFlag(cc){if(!cc)return'';try{return String.fromCodePoint(...[...cc.toUpperCase()].map(c=>0x1F1E6+c.charCodeAt(0)-65));}catch(e){return'';}}
function pf(p){const f=countryFlag(p&&p.country);return f?' '+f:'';}

function parseQR(raw) {
  if(!raw||!raw.trim()) return null;
  const trimmed = raw.trim();

  // Check if this is an SPC Community Card QR (Member ID format: SPC-XXXXX or SPC-XXXXX/CC)
  const spcMatch = trimmed.match(/^(SPC-\d{5})(\/([A-Z]{2}))?$/i);
  if(spcMatch) {
    const memberId = spcMatch[1].toUpperCase();
    const country = spcMatch[3] ? spcMatch[3].toUpperCase() : null;
    try {
      const cache = JSON.parse(localStorage.getItem('spc_members_cache')||'{}');
      const name = cache[memberId];
      if(name) return {name, country};
      alert('Member ID ' + memberId + ' not found in local cache. Try syncing members first.');
      return null;
    } catch(e) { return null; }
  }

  // Boarding pass format: semicolon-separated, name in position 4
  const parts=trimmed.split(';');
  if(parts.length>=4) {
    const name=parts[3]?parts[3].trim():'';
    return name?{name,country:null}:null;
  }
  // Plain typed name — use as-is
  return trimmed?{name:trimmed,country:null}:null;
}

  return{...t,currentLevelIdx:ni,timeRemainingSeconds:t.structure[ni].mins*60};
}

function generatePayoutRows(entries, prizePool, roundToFifty=false, placesOverride=null) {
  if (entries <= 0 || prizePool <= 0) return [];
  // Find the matching bracket
  let bracket = SPC_PAYOUT_TABLE.find(b => entries >= b.minP && entries <= b.maxP)
    || SPC_PAYOUT_TABLE[SPC_PAYOUT_TABLE.length - 1];
  // If places override is given, find the bracket that has that many payout places
  if (placesOverride && placesOverride > 0) {
    const match = SPC_PAYOUT_TABLE.find(b => b.pcts && b.pcts.length === placesOverride);
    if (match) bracket = match;
    else {
      // If no exact match, trim or extend the bracket to fit
      bracket = {...bracket, pcts: bracket.pcts.slice(0, placesOverride)};
      // Normalize pcts to sum to 100
      const sum = bracket.pcts.reduce((a,b)=>a+b,0);
      if (sum > 0) bracket = {...bracket, pcts: bracket.pcts.map(p=>p/sum*100)};
    }
  }
  const multiple = roundToFifty ? 50 : 100;
  let rows = bracket.pcts.map((pct, i) => {
    const raw = pct / 100 * prizePool;
    const amount = Math.floor(raw / multiple) * multiple;
    return {position: i+1, pct: Math.round(pct*100)/100, amount};
  });
  // House tops up: sum all amounts, difference goes to 1st place
  const allocated = rows.reduce((s,r) => s+r.amount, 0);
  const diff = prizePool - allocated;
  if (diff > 0) rows[0].amount += Math.ceil(diff / multiple) * multiple;
  return rows;
}

<div class="stat"><div class="stat-label">Payout pool</div><div class="stat-val">S$${payoutPool.toLocaleString()}</div></div>
</div>
${t.extraBagWinners&&t.extraBagWinners.length>0?`<h2>Extra Bag Winners</h2><table><tr><th>Player</th><th>Bags</th><th class="r">Amount</th></tr>${t.extraBagWinners.map(w=>`<tr><td>${w.name} ${countryFlag(w.country)}</td><td>×${w.bags} (${w.totalQualifications} flights)</td><td class="r amt">S$${(w.bags*1500).toLocaleString()}</td></tr>`).join('')}</table>`:''}
<h2>Final Standings</h2><table><tr><th>#</th><th>Player</th><th>Status</th><th class="r">Payout (S$)</th></tr>
${active>0?t.players.filter(p=>p.status==='active').map(p=>{const po=payouts.find(x=>(x.position||0)===1);return`<tr><td>—</td><td>${p.name} ${countryFlag(p.country)}</td><td>Active</td><td class="r"></td></tr>`;}).join(''):''}
${standings.map(p=>{const po=payoutMap[p.bustPosition];const amt=po?po.amount:0;return`<tr><td>${p.bustPosition||'—'}</td><td>${p.name} ${countryFlag(p.country)}</td><td>Eliminated</td><td class="r${po?' amt':''}">${po?'S$'+amt.toLocaleString():''}</td></tr>`;}).join('')}
</table></body></html>`;
    const reportName=(t.name||'tournament').replace(/[^a-z0-9]/gi,'_')+'_Report.html';
    if(window.electronAPI&&window.electronAPI.showSaveDialog){
      window.electronAPI.showSaveDialog({defaultPath:reportName,filters:[{name:'HTML',extensions:['html']}]}).then(function(result){
        if(!result.canceled&&result.filePath) window.electronAPI.writeFile(result.filePath,html);
      });
    }else{
      const blob=new Blob([html],{type:'text/html'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=reportName;
      a.click();URL.revokeObjectURL(a.href);
    }
    return;
  }
  // Full backup — .spc file
  const payload = { _spcExport: 'tournament', _version: 1, ...t };
  const json = JSON.stringify(payload, null, 2);
  const safeName = (t.name||'tournament').replace(/[^a-z0-9]/gi,'_').toLowerCase();
  const backupName = `spc_backup_${safeName}.spc`;
  if(window.electronAPI&&window.electronAPI.showSaveDialog){
    window.electronAPI.showSaveDialog({defaultPath:backupName,filters:[{name:'SPC Backup',extensions:['spc']}]}).then(function(result){
      if(!result.canceled&&result.filePath) window.electronAPI.writeFile(result.filePath,json);
    });
  }else{
    const blob = new Blob([json], {type:'application/octet-stream'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = backupName;
    a.click();
    URL.revokeObjectURL(a.href);
  }
}

function importFromFile(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data._spcExport) throw new Error('Not a valid SPC export file');
      onSuccess(data);
    } catch(err) { onError(err.message); }
  };
  reader.readAsText(file);
}

/* ==== STORAGE HELPERS ==== */
function getIndex() { try{return JSON.parse(localStorage.getItem('spc_index')||'[]');}catch(e){return[];} }
function saveT(t) {
  try {
    localStorage.setItem(`spc_t_${t.id}`, JSON.stringify(t));
    const idx=getIndex(); const i=idx.findIndex(x=>x.id===t.id);
    const entry={id:t.id,name:t.name,eventType:t.eventType,status:t.status,modified:Date.now()};
    if(i>=0)idx[i]=entry; else idx.unshift(entry);
    localStorage.setItem('spc_index',JSON.stringify(idx));
  } catch(e){}
}
function loadT(id) { try{return JSON.parse(localStorage.getItem(`spc_t_${id}`)||'null');}catch(e){return null;} }
function deleteT(id) {
  try {
    localStorage.removeItem(`spc_t_${id}`);
    localStorage.setItem('spc_index',JSON.stringify(getIndex().filter(x=>x.id!==id)));
  } catch(e){}
}
function writeLive(t, cur, nxt, active, tables) {
  try {
    const _payouts=(()=>{
      if(t.payoutTable&&t.payoutTable.length) return t.payoutTable.slice(0,10);
      const _e=t.players.length+(t.inheritedEntries||0);
      const _pp=t.prizePool||0;
      if(_e>0&&_pp>0) return generatePayoutRows(_e,_pp,t.eventType==='mysteryBounty').slice(0,10);
      return [];
    })();
    const _cumEntries=t.players.length+(t.inheritedEntries||0);
    const _cumBusted=t.players.filter(p=>p.status==='busted').length+(t.inheritedBusted||0);
    localStorage.setItem(`spc_live_${t.id}`, JSON.stringify({
      name:t.name, eventType:t.eventType, cur, nxt,
      secs:t.timeRemainingSeconds, status:t.status,
      activePlayers:active.length, tablesInUse:tables, prizePool:t.prizePool, bountyPool:t.bountyPool||0,
      totalEntries:_cumEntries, totalBusted:_cumBusted,
      avgStack:active.length>0?Math.round(((t.chipsInPlay||_cumEntries*t.stack))/active.length):0,
      payouts:_payouts, payoutsPublished:t.payoutsPublished||false, ts:Date.now()
    }));
  } catch(e){}
}

/* ==== APP ==== */
function App() {
  if(DISPLAY_ID) return <DisplayPage id={DISPLAY_ID}/>;

  const [view,setView] = useState('home');
  const [selEvent,setSelEvent] = useState(null);
  const [tournament,setTournament] = useState(null);
  const [subview,setSubview] = useState('clock');
  // Global callback for RegisterView to persist regLog
  window._spcUpdateRegLog = function(log){ setTournament(t=>({...t,regLog:log})); };
  const [modal,setModal] = useState(null);
  const [savedIndex,setSavedIndex] = useState(getIndex);
  const timerRef = useRef(null);

  /* Timer */
  useEffect(()=>{
    if(tournament&&tournament.status==='running'){
      clearInterval(timerRef.current);
      timerRef.current=setInterval(()=>{
        setTournament(prev=>{
          if(!prev||prev.status!=='running')return prev;
          const t=prev.timeRemainingSeconds-1;
          return t<=0?advanceLevelFn(prev):{...prev,timeRemainingSeconds:t};
        });
      },1000);
    } else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[tournament&&tournament.status, tournament&&tournament.currentLevelIdx]);

  /* Live display sync — write on every tournament state change */
  useEffect(()=>{
    if(!tournament) return;
    const cur=tournament.structure[tournament.currentLevelIdx];
    const nxt=tournament.structure[tournament.currentLevelIdx+1];
    const active=tournament.players.filter(p=>p.status==='active');
    const tables=[...new Set(active.map(p=>p.tableNum).filter(Boolean))].length;
    writeLive(tournament,cur,nxt,active.length,tables);
    // Sync to floor UI via Electron
    if(typeof window.electronAPI!=='undefined'&&tournament){
      window.electronAPI.sendClockState({
        secs:tournament.timeRemainingSeconds,
        running:tournament.status==='running',
        isBreak:cur&&cur.isBreak,
        level:cur&&cur.level,
        sb:cur&&cur.sb,bb:cur&&cur.bb,ante:cur&&cur.ante,
        eventName:EVENT_CONFIGS[tournament.eventType]?EVENT_CONFIGS[tournament.eventType].group:'SPC',
      });
      const cumE=tournament.players.length+(tournament.inheritedEntries||0);
      const _activePlayers=tournament.players.filter(p=>p.status==='active');
      const _unseated=_activePlayers.filter(p=>!p.tableNum).map(p=>({id:p.id,name:p.name,country:p.country||null}));
      const _evCfg=EVENT_CONFIGS[tournament.eventType]||null;
      const _curLevel=cur&&!cur.isBreak?cur.level:null;
      const _reentryUntil=_evCfg?(_evCfg.reentryUntilLevel||0):0;
      const _maxR=_evCfg?_evCfg.maxReentries:0;
      const _reentryOpen=_reentryUntil>0&&(_curLevel===null||_curLevel<=_reentryUntil);
      const _reentryDesc=!_evCfg||_maxR===0?'No re-entries':
        _maxR===1?`1 re-entry · closes after Level ${_reentryUntil}`:
        `Unlimited re-entries · closes after Level ${_reentryUntil}`;
      // Build table map with full player data per seat
      const _tableMap={};
      const _st=tournament.startTable||1;
      const _mt=tournament.maxTables||15;
      for(let i=0;i<_mt;i++) _tableMap[_st+i]={num:_st+i,count:0,capacity:tournament.seatsPerTable||9,players:[]};
      _activePlayers.forEach(p=>{if(p.tableNum&&_tableMap[p.tableNum]){_tableMap[p.tableNum].count++;_tableMap[p.tableNum].players.push({id:p.id,name:p.name,seatNum:p.seatNum,country:p.country||null});}});
      window.electronAPI.sendTournamentState({
        active:_activePlayers.length,
        players:tournament.players.length,
        inheritedEntries:tournament.inheritedEntries||0,
        tables:[...new Set(_activePlayers.map(p=>p.tableNum).filter(Boolean))].length,
        prizePool:tournament.prizePool||0,
        unseated:_unseated,
        tableMap:Object.values(_tableMap).sort((a,b)=>a.num-b.num),
        reentryOpen:_reentryOpen,
        reentryDesc:_reentryDesc,
        reentryUntil:_reentryUntil,
        seatingMode:tournament.seatingMode||'auto',
        eventName:_evCfg?_evCfg.name:'',
        seatLocks:tournament.seatLocks||{},
      });
    }
  },[tournament]);

  /* Floor action handler (from phones via Electron) */
  useEffect(()=>{
    function handleFloorAction(e){
      const action=e.detail;
      if(!action||!tournament)return;
      if(action.type==='register'||action.type==='register-next'){
        // register by name if given, otherwise register next available number
        if(action.name){
          const existing=tournament.players.find(p=>p.name===action.name&&p.status==='active');
          if(!existing){addPlayer(action.name);SoundEngine.register();}
        } else {
          // find next unused number
          const used=new Set(tournament.players.map(p=>p.name));
          let next=1;
          while(used.has(String(next).padStart(3,'0')))next++;
          addPlayer(String(next).padStart(3,'0'));SoundEngine.register();
        }
      } else if(action.type==='undo-register'){
        // remove the most recently registered active player
        setTournament(t=>{
          const active=[...t.players].filter(p=>p.status==='active').sort((a,b)=>b.registeredAt-a.registeredAt);
          if(active.length===0)return t;
          const remove=active[0].id;
          return {...t, players:t.players.filter(p=>p.id!==remove)};
        });
      } else if(action.type==='bust'||action.type==='bust-random'){
        if(action.name){
          const p=tournament.players.find(pl=>pl.name===action.name&&pl.status==='active');
          if(p){bustPlayer(p.id);SoundEngine.bust();}
        } else {
          // bust a random active player
          const active=tournament.players.filter(p=>p.status==='active');
          if(active.length>0){
            const p=active[Math.floor(Math.random()*active.length)];
            bustPlayer(p.id);SoundEngine.bust();
          }
        }
      } else if(action.type==='undo-bust'){
        // restore the most recently busted player
        setTournament(t=>{
          const busted=[...t.players].filter(p=>p.status==='busted').sort((a,b)=>(b.bustedAt||0)-(a.bustedAt||0));
          if(busted.length===0)return t;
          const restore=busted[0].id;
          return {...t, players:t.players.map(p=>p.id===restore?{...p,status:'active',bustedAt:undefined,finishPos:undefined}:p)};
        });
      } else if(action.type==='clock-toggle'){
        toggleClock();
      } else if(action.type==='clock-action'){
        if(action.action==='prev')prevLevel();
        else if(action.action==='next')nextLevel();
        else if(action.action==='minus1')adjustTime(-60);
        else if(action.action==='plus1')adjustTime(60);
      } else if(action.type==='assign-seat'){
        if(action.playerId) assignSeat(action.playerId, action.tableNum, action.seatNum);
      } else if(action.type==='bust-player'){
        if(action.playerId){ bustPlayer(action.playerId); SoundEngine.bust(); }
      } else if(action.type==='move-player'){
        if(action.playerId&&action.tableNum&&action.seatNum){
          movePlayerSeat(action.playerId, action.tableNum, action.seatNum);
        }
      } else if(action.type==='open-table'){
        openTable();
      } else if(action.type==='set-seating-mode'){
        if(action.mode) setSeatingMode(action.mode);
      } else if(action.type==='close-table-confirm'){
        if(action.assignments&&action.closingTable){
          closeTableConfirm(action.assignments, action.closingTable);
        }
      } else if(action.type==='set-seat-lock'){
        if(action.tableNum&&action.seatNum) setSeatLock(action.tableNum,action.seatNum,action.lockType||'none');
      }
    }
    window.addEventListener('spc-floor-action',handleFloorAction);
    return()=>window.removeEventListener('spc-floor-action',handleFloorAction);
  },[tournament,addPlayer,bustPlayer,toggleClock,prevLevel,nextLevel,adjustTime,assignSeat,movePlayerSeat,openTable,setSeatLock]);

  /* Floor URL overlay */
  const [serverInfo,setServerInfo]=useState(null);
  const [showFloorModal,setShowFloorModal]=useState(false);
  useEffect(()=>{
    // Listen for future events
    function onServer(e){setServerInfo(e.detail);}
    window.addEventListener('spc-server-ready',onServer);
    // Also poll immediately — server may have started before React mounted
    if(typeof window.electronAPI!=='undefined'){
      window.electronAPI.getServerInfo().then(info=>{
        if(info&&info.ip) setServerInfo(info);
      });
      // Poll every 2s for up to 30s in case server is slow to start
      let attempts=0;
      const poll=setInterval(()=>{
        attempts++;
        window.electronAPI.getServerInfo().then(info=>{
          if(info&&info.ip){ setServerInfo(info); clearInterval(poll); }
          if(attempts>=15) clearInterval(poll);
        });
      },2000);
      return()=>{ window.removeEventListener('spc-server-ready',onServer); clearInterval(poll); };
    }
    return()=>window.removeEventListener('spc-server-ready',onServer);
  },[]);

  /* Auto-save every 30s */
  useEffect(()=>{
    if(!tournament) return;
    const iv=setInterval(()=>{saveT(tournament);setSavedIndex(getIndex());},30000);
    return()=>clearInterval(iv);
  },[tournament]);

  function startTournament(config) {
    const structure=[...config.structure];
    const guarantee = config.guarantee||0;
    const inheritedEntries=config.inheritedEntries||0;
    const inheritedBusted=config.inheritedBusted||0;
    const inheritedPrizePool=config.inheritedPrizePool||0;
    // Pre-seat survivors from prior flight
    const _inheritedPlayers=config.inheritedPlayers||[];
    const _maxT=config.maxTables||15;
    const _spt=config.seatsPerTable||9;
    const isDay2=config.stack===0;

    // Detect duplicate players in inherited list (multi-flight qualifiers)
    let _deduped=_inheritedPlayers;
    let _extraBagWinners=[];
    let _totalExtraBags=0;
    let _actualChips=0;

    // Always deduplicate inherited players: keep best stack per name
    if(_inheritedPlayers.length>0){
      const bestByName={};
      _inheritedPlayers.forEach(p=>{
        if(!bestByName[p.name]||(p.chipCount||0)>(bestByName[p.name].chipCount||0)){
          bestByName[p.name]=p;
        }
      });
      _deduped=Object.values(bestByName);
    }

    // Day 2: calculate extra bags and actual chips
    if(isDay2&&_inheritedPlayers.length>0){
      const counts={};
      _inheritedPlayers.forEach(p=>{counts[p.name]=(counts[p.name]||0)+1;});
      const _ipCountries={};_inheritedPlayers.forEach(p=>{if(p.country)_ipCountries[p.name]=p.country;});
      Object.keys(counts).forEach(name=>{
        if(counts[name]>1){
          const bags=counts[name]-1;
          _extraBagWinners.push({name,bags,totalQualifications:counts[name],country:_ipCountries[name]||null});
          _totalExtraBags+=bags;
        }
      });
      _extraBagWinners.sort((a,b)=>b.bags-a.bags||a.name.localeCompare(b.name));
      _actualChips=_deduped.reduce((s,p)=>s+(p.chipCount||0),0);
    }

    let _seatedPlayers=[];
    let _baggedPlayers=[];
    if(isDay2){
      // Day 2: seat deduplicated inherited players
      _deduped.forEach((p,idx)=>{
        const tNum=(idx%_maxT)+1;
        const sNum=Math.floor(idx/_maxT)+1;
        const bestHistorical=Math.max(p.chipCount||0,p.inheritedChipCount||0);
        _seatedPlayers.push({...p,id:uid(),status:'active',bustPosition:null,inherited:true,
          chipCount:p.chipCount||0,inheritedChipCount:bestHistorical,
          tableNum:sNum<=_spt?tNum:null,seatNum:sNum<=_spt?sNum:null});
      });
    }else{
      // Day 1 flights: store ALL inherited entries (no dedup) to preserve flight counts for Day 2 extra bags
      _baggedPlayers=_inheritedPlayers.map(p=>({
        name:p.name,
        chipCount:Math.max(p.chipCount||0,p.inheritedChipCount||0),
        inheritedChipCount:Math.max(p.chipCount||0,p.inheritedChipCount||0),
      }));
    }
    // Pre-seeded survivors are now in players[] — remove them from
    // inheritedEntries and inheritedBusted to avoid double-counting
    const adjustedInheritedEntries = isDay2 ? Math.max(0, inheritedEntries - _deduped.length) : inheritedEntries;
    const adjustedInheritedBusted  = inheritedBusted; // busted count stays — survivors are not busted
    const bountyAmount=config.bountyAmount||0;
    const netPerEntry=(config.prizeComponent||0)*(1-(config.adminFeePercent||0)/100); // keep full decimal e.g. 508.80
    const prizePerEntry=netPerEntry-bountyAmount;
    const calcInitPrize=inheritedPrizePool>0
      ? inheritedPrizePool
      : Math.round((inheritedEntries+_inheritedPlayers.length)*prizePerEntry*100)/100;
    const t={id:uid(),name:config.name,eventType:config.eventType,buyin:config.buyin,
      prizeComponent:config.prizeComponent,adminFeePercent:config.adminFeePercent,
      itmPercent:config.itmPercent||15,guarantee,
      inheritedEntries:adjustedInheritedEntries,inheritedBusted:adjustedInheritedBusted,inheritedPrizePool,
      bountyAmount,prizePerEntry,bountyPool:Math.max(Math.round(inheritedEntries*bountyAmount),0),
      stack:config.stack,maxTables:config.maxTables,seatsPerTable:config.seatsPerTable,startTable:config.startTable||1,
      players:_seatedPlayers,structure,currentLevelIdx:0,timeRemainingSeconds:structure[0].mins*60,
      status:'paused',prizePool:Math.max(calcInitPrize,guarantee),payoutTable:null,seatingMode:'auto',regLog:[],seatLocks:{},
      baggedPlayers:_baggedPlayers,
      extraBagWinners:_extraBagWinners,extraBagCount:_totalExtraBags>0?_totalExtraBags:(config.extraBagCount||0),
      chipsInPlay:_actualChips>0?_actualChips
        :(config.stack===0&&inheritedEntries>0&&config.inheritedStack>0
        ? inheritedEntries*(config.inheritedStack)
        : 0)};
    setTournament({...t, payoutsPublished:false}); setSubview('register'); setView('tournament');
  }

  function resetTournament() {
    if (!tournament) return;
    if (!confirm('Reset this event? All players, busts and table assignments will be cleared. Clock returns to Level 1. This cannot be undone.')) return;
    setTournament(t => ({
      ...t,
      players: [],
      currentLevelIdx: 0,
      timeRemainingSeconds: t.structure[0].mins * 60,
      status: 'paused',
      prizePool: t.guarantee || 0,
      bountyPool: 0,
      payoutTable: null,
    }));
  }
  function exportCurrentSave() { if(tournament) exportTournament(tournament, false); }
  function exportCurrentTemplate() { if(tournament) exportTournament(tournament, true); }

  function handleImportFile(file) {
    importFromFile(file, data => {
      if (data._spcExport === 'tournament') {
        // Full save: load directly
        const t = {...data};
        delete t._spcExport; delete t._version;
        // Give it a fresh id to avoid collision
        t.id = uid();
        saveT(t); setSavedIndex(getIndex());
        alert(`Imported: "${t.name}"
Saved to your tournament list.`);
      } else if (data._spcExport === 'template') {
        // Template: create new tournament from config
        const cfg = {...data};
        delete cfg._spcExport; delete cfg._version;
        alert(`Template imported: "${cfg.name}"
Starting setup — you can adjust settings before launching.`);
        setSelEvent(cfg.eventType||'miniRoller');
        // Pre-fill setup by storing template config for SetupScreen to read
        window._importedTemplate = cfg;
        setView('setup');
      } else {
        alert('Unrecognised file format.');
      }
    }, err => alert('Import failed: ' + err));
  }

  function resumeTournament(id) {
    const t=loadT(id);
    if(t){setTournament({...t, payoutsPublished:t.payoutsPublished||false});setSubview('clock');setView('tournament');}
  }

  function deleteTournament(id) {
    deleteT(id); setSavedIndex(getIndex());
    if(tournament&&tournament.id===id){setTournament(null);setView('home');}
  }

  function openDisplayWindow() {
    if(!tournament) return;
    const url=window.location.href.split('#')[0]+'#display='+tournament.id;
    window.open(url,'spc_display_'+tournament.id,'width=1920,height=1080,menubar=no,toolbar=no,scrollbars=no');
  }

  function saveTournamentNow() {
    if(!tournament) return;
    saveT(tournament); setSavedIndex(getIndex()); alert('Saved!');
  }

  function toggleClock(){setTournament(t=>{
    const newStatus=t.status==='running'?'paused':'running';
    return{...t,status:newStatus,activityLog:[...(t.activityLog||[]),{ts:Date.now(),type:'clock',detail:newStatus==='running'?'Clock started':'Clock paused'}]};
  });}
  function publishPayouts(){setTournament(t=>({...t,payoutsPublished:true}));}
  function unpublishPayouts(){setTournament(t=>({...t,payoutsPublished:false}));}
  function prevLevel(){setTournament(t=>{const i=Math.max(0,t.currentLevelIdx-1);return{...t,currentLevelIdx:i,timeRemainingSeconds:t.structure[i].mins*60};});}
  function nextLevel(){setTournament(advanceLevelFn);}
  function adjustTime(s){setTournament(t=>({...t,timeRemainingSeconds:Math.max(0,t.timeRemainingSeconds+s)}));}

  function addPlayer(name, forceAuto=false, country=null){
    setTournament(t=>{
      const mode=t.seatingMode||'auto';
      let players=[...t.players];
      const seat=(mode==='auto'||forceAuto)?findSeat(players,t.maxTables,t.seatsPerTable,t.startTable||1,t.seatLocks||{}):{tableNum:null,seatNum:null};
      const p={id:uid(),name,status:'active',bustPosition:null,...seat,registeredAt:Date.now()};
      if(country) p.country=country;
      players=[...players,p];
      const totalE=(players.length+(t.inheritedEntries||0));
      let prizePool;
      if(t.inheritedPrizePool>0&&t.prizePerEntry===0){
        prizePool=t.inheritedPrizePool;
      } else {
        const _ppeCalc=t.prizePerEntry!=null&&t.prizePerEntry>0?t.prizePerEntry:(t.prizeComponent||0)*(1-(t.adminFeePercent||0)/100);
        const calcPrize=Math.round(totalE*_ppeCalc*100)/100;
        prizePool=Math.max(calcPrize,t.guarantee||0);
      }
      const bountyPool=t.bountyAmount>0?Math.round(totalE*t.bountyAmount):0;
      return{...t,players,prizePool,bountyPool};
    });
  }
  function addPlayers(names){
    setTournament(t=>{
      let players=[...t.players];
      names.forEach(name=>{const seat=findSeat(players,t.maxTables,t.seatsPerTable,t.startTable||1,t.seatLocks||{});players.push({id:uid(),name,status:'active',bustPosition:null,...seat});});
      const totalE=(players.length+(t.inheritedEntries||0));
      let prizePool;
      if(t.inheritedPrizePool>0&&t.prizePerEntry===0){
        // Day 2: prize pool is fixed from carry-forward, doesn't grow with new entries
        prizePool=t.inheritedPrizePool;
      } else {
        const _ppeCalc=t.prizePerEntry!=null&&t.prizePerEntry>0?t.prizePerEntry:(t.prizeComponent||0)*(1-(t.adminFeePercent||0)/100);
        const calcPrize=Math.round(totalE*_ppeCalc*100)/100; // round to cents
        prizePool=Math.max(calcPrize,t.guarantee||0);
      }
      const bountyPool=t.bountyAmount>0?Math.round(totalE*t.bountyAmount):0;
      return{...t,players,prizePool,bountyPool};
    });
  }
  function bustPlayer(id){
    const player=tournament.players.find(p=>p.id===id);
    setTournament(t=>{
      const active=t.players.filter(p=>p.status==='active');
      const position=active.length;
      return{...t,players:t.players.map(p=>p.id===id?{...p,status:'busted',bustPosition:position,tableNum:null,seatNum:null}:p),
        activityLog:[...(t.activityLog||[]),{ts:Date.now(),type:'bust',detail:`${player?player.name:'?'} busted ${fmt.ordinal(position)} (T${player?player.tableNum:''} S${player?player.seatNum:''})`}]};
    });
  }
  function updatePlayerName(id,name){setTournament(t=>({...t,players:t.players.map(p=>p.id===id?{...p,name}:p)}));}
  function bustManyPlayers(ids){
    setTournament(t=>{
      let players=[...t.players];
      // Bust sequentially so each position is tracked correctly
      ids.forEach(id=>{
        const active=players.filter(p=>p.status==='active');
        const position=active.length;
        players=players.map(p=>p.id===id?{...p,status:'busted',bustPosition:position,tableNum:null,seatNum:null}:p);
      });
      return{...t,players};
    });
  }
  function removePlayer(id){
    setTournament(t=>({...t,players:t.players.filter(p=>p.id!==id)}));
  }
  function assignSeat(id, tableNum, seatNum){
    setTournament(t=>{
      let seat;
      if(tableNum&&seatNum){
        seat={tableNum:Number(tableNum),seatNum:Number(seatNum)};
      }else{
        seat=findSeat(t.players,t.maxTables,t.seatsPerTable,t.startTable||1,t.seatLocks||{});
      }
      return{...t,players:t.players.map(p=>p.id===id?{...p,...seat}:p)};
    });
  }
  function movePlayerSeat(id,tableNum,seatNum){
    setTournament(t=>{
      const lk=(t.seatLocks||{})[tableNum+'-'+seatNum];
      if(lk==='move'||lk==='all') return t;
      return{...t,players:t.players.map(p=>p.id===id?{...p,tableNum,seatNum}:p)};
    });
  }
  function setSeatingMode(mode){
    setTournament(t=>({...t,seatingMode:mode}));
  }

  function logActivity(type,detail){
    setTournament(t=>{
      const log=[...(t.activityLog||[]),{ts:Date.now(),type,detail}];
      if(log.length>500) log.splice(0,log.length-500);
      return{...t,activityLog:log};
    });
  }
  function updateCurrentBlinds(sb, bb, ante) {
    setTournament(t=>{
      const structure=t.structure.map((lv,i)=>
        i===t.currentLevelIdx ? {...lv, sb:Number(sb)||lv.sb, bb:Number(bb)||lv.bb, ante:Number(ante)||0} : lv
      );
      return{...t,structure};
    });
  }
  function updateBlindLevel(idx, field, val) {
    setTournament(t=>{
      const structure=t.structure.map((lv,i)=>
        i===idx ? {...lv, [field]:Number(val)||0} : lv
      );
      return{...t,structure};
    });
  }
  function setChipsInPlay(val) {
    setTournament(t=>({...t,chipsInPlay:Number(val)||0}));
  }
  function updateChipCount(playerId,chipCount){
    setTournament(t=>({...t,players:t.players.map(p=>p.id===playerId?{...p,chipCount:Number(chipCount)||0}:p)}));
  }
  function exportSeating(){
    const sorted=[...activePlayers].sort((a,b)=>(a.tableNum||0)-(b.tableNum||0)||(a.seatNum||0)-(b.seatNum||0));
    const evName=tournament.name||'Tournament';
    const rows=[['Table','Seat','Player','Chip Count']];
    sorted.forEach(p=>rows.push([
      p.tableNum||'',
      p.seatNum||'',
      p.name||'',
      p.chipCount||''
    ]));
    const csv='\uFEFF'+rows.map(r=>r.map(v=>{
      const s=String(v==null?'':v);
      return s.includes(',')||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(',')).join('\n');
    const defaultName=evName.replace(/[^a-zA-Z0-9]/g,'_')+'_Seating.csv';
    if(window.electronAPI&&window.electronAPI.showSaveDialog){
      window.electronAPI.showSaveDialog({defaultPath:defaultName,filters:[{name:'CSV',extensions:['csv']}]}).then(function(result){
        if(!result.canceled&&result.filePath) window.electronAPI.writeFile(result.filePath,csv);
      });
    }else{
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=defaultName;a.click();
    }
  }
  function setSeatLock(tableNum,seatNum,lockType){
    setTournament(t=>{
      const key=tableNum+'-'+seatNum;
      const locks={...(t.seatLocks||{})};
      if(!lockType||lockType==='none') delete locks[key];
      else locks[key]=lockType;
      return{...t,seatLocks:locks};
    });
  }
  function importPlayersFromFile(playerList) {
    setTournament(t => {
      let players = [...t.players];
      playerList.forEach(({name, tableNum}) => {
        let tNum = tableNum || null, seatNum = null;
        if (tNum) {
          for (let s = 1; s <= t.seatsPerTable; s++) {
            if (!players.find(p => p.status==='active' && p.tableNum===tNum && p.seatNum===s)) { seatNum=s; break; }
          }
          if (!seatNum) { const seat=findSeat(players,t.maxTables,t.seatsPerTable,t.startTable||1,t.seatLocks||{}); tNum=seat.tableNum; seatNum=seat.seatNum; }
        } else {
          const seat=findSeat(players,t.maxTables,t.seatsPerTable,t.startTable||1,t.seatLocks||{}); tNum=seat.tableNum; seatNum=seat.seatNum;
        }
        players.push({id:uid(),name,status:'active',bustPosition:null,tableNum:tNum,seatNum});
      });
      const totalE=(players.length+(t.inheritedEntries||0));
      let prizePool;
      if(t.inheritedPrizePool>0&&t.prizePerEntry===0){
        // Day 2: prize pool is fixed from carry-forward, doesn't grow with new entries
        prizePool=t.inheritedPrizePool;
      } else {
        const _ppeCalc=t.prizePerEntry!=null&&t.prizePerEntry>0?t.prizePerEntry:(t.prizeComponent||0)*(1-(t.adminFeePercent||0)/100);
        const calcPrize=Math.round(totalE*_ppeCalc*100)/100; // round to cents
        prizePool=Math.max(calcPrize,t.guarantee||0);
      }
      const bountyPool=t.bountyAmount>0?Math.round(totalE*t.bountyAmount):0;
      return{...t,players,prizePool,bountyPool};
    });
  }
  function balanceTables(){
    setTournament(t=>{
      const active=t.players.filter(p=>p.status==='active');
      if(!active.length)return t;
      const st=t.startTable||1;
      const numT=Math.min(t.maxTables,Math.ceil(active.length/t.seatsPerTable));
      const reassigned=active.map((p,i)=>({...p,tableNum:st+(i%numT),seatNum:Math.floor(i/numT)+1}));
      const ids=new Set(reassigned.map(p=>p.id));
      return{...t,players:[...reassigned,...t.players.filter(p=>!ids.has(p.id))]};
    });
  }

  function openTable(){
    setTournament(t=>{
      const newMax=Math.min(15,t.maxTables+1);
      return{...t,maxTables:newMax};
    });
    SoundEngine.register();
  }

  function closeTableConfirm(assignments, closingTable){
    logActivity('table',`Table ${closingTable} closed — ${Object.keys(assignments).length} players reassigned`);
    setTournament(t=>{
      if(t.maxTables<=1)return t;
      const newMax=t.maxTables-1;
      // Adjust startTable if we're closing a table that's NOT the last one
      const lastTable=(t.startTable||1)+t.maxTables-1;
      let newStart=t.startTable||1;
      // Move players from closing table to their assigned seats
      let players=[...t.players];
      assignments.forEach(({playerId,tableNum,seatNum})=>{
        players=players.map(p=>p.id===playerId?{...p,tableNum,seatNum}:p);
      });
      // If closing a middle table, shift higher tables down by 1
      if(closingTable!==lastTable){
        players=players.map(p=>p.status==='active'&&p.tableNum&&p.tableNum>closingTable
          ?{...p,tableNum:p.tableNum-1}:p);
      }
      return{...t,maxTables:newMax,players};
    });
  }

  function redrawSeats(){
    setTournament(t=>{
      const active=t.players.filter(p=>p.status==='active');
      const st=t.startTable||1;
      const mt=t.maxTables||15;
      const sp=t.seatsPerTable||9;
      // Build all available seat positions
      const seats=[];
      for(let tb=0;tb<mt;tb++) for(let s=1;s<=sp;s++) seats.push({tableNum:st+tb,seatNum:s});
      // Fisher-Yates shuffle
      for(let i=seats.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[seats[i],seats[j]]=[seats[j],seats[i]];}
      const reassigned=active.map((p,i)=>({...p,...(seats[i]||{tableNum:null,seatNum:null})}));
      const ids=new Set(reassigned.map(p=>p.id));
      return{...t,players:[...reassigned,...t.players.filter(p=>!ids.has(p.id))]};
    });
  }

  function updatePayoutSettings(updates) {
    setTournament(t => {
      const merged = {...t, ...updates};
      if (updates.guarantee !== undefined || updates.prizeComponent !== undefined || updates.adminFeePercent !== undefined) {
        const _ppe=merged.prizePerEntry!=null?merged.prizePerEntry:Math.round((merged.prizeComponent||0)*(1-(merged.adminFeePercent||0)/100));
        const calcPrize = Math.round((t.players.length+(t.inheritedEntries||0))*_ppe);
        merged.prizePool = Math.max(calcPrize, merged.guarantee||0);
      }
      return merged;
    });
  }

  const cur=tournament?tournament.structure[tournament.currentLevelIdx]:null;
  const nxt=tournament?tournament.structure[tournament.currentLevelIdx+1]:null;
  const activePlayers=tournament?tournament.players.filter(p=>p.status==='active'):[];
  const bustedPlayers=tournament?tournament.players.filter(p=>p.status==='busted'):[];
  const tablesInUse=[...new Set(activePlayers.map(p=>p.tableNum).filter(Boolean))].length;
  const secs=tournament?tournament.timeRemainingSeconds:0;
  const clockCls=secs<=60?'danger':secs<=300?'warn':'';

  return(
    <div className="app">
      {view==='home'&&<HomeScreen onSelect={t=>{setSelEvent(t);setView('setup');}} savedIndex={savedIndex} onResume={resumeTournament} onDelete={deleteTournament} onExportSave={t=>exportTournament(t,false)} onExportTemplate={t=>exportTournament(t,true)} onImport={handleImportFile}/>}
      {view==='setup'&&<SetupScreen eventType={selEvent} onBack={()=>setView('home')} onStart={startTournament}/>}
      {/* Floor staff connection modal */}
      {showFloorModal&&(
        <div className="floor-modal-bg" onClick={()=>setShowFloorModal(false)}>
          <div className="floor-modal" onClick={e=>e.stopPropagation()}>
            <div className="floor-modal-title">Floor Staff Access</div>
            <div className="floor-modal-sub">Open this URL on any phone on the same wifi</div>
            {serverInfo
              ?<div className="floor-url-big">{`http://${serverInfo.ip}:${serverInfo.port}`}</div>
              :<div className="floor-url-big" style={{fontSize:14,color:'#c8973a'}}>
                Run in Terminal: <br/>
                <span style={{fontSize:12,letterSpacing:.5}}>ipconfig getifaddr en0</span><br/>
                <span style={{fontSize:11,color:'#3a5a42'}}>Then open http://[that IP]:3456 on your phone</span>
              </div>
            }
            <div style={{fontSize:11,color:'#3a5a42',marginBottom:16}}>Floor staff can register players, bust players, and control the clock.</div>
            <button className="btn-primary" style={{width:'100%'}} onClick={()=>setShowFloorModal(false)}>Close</button>
          </div>
        </div>
      )}
      {view==='tournament'&&tournament&&(()=>{
        const _th=getTheme(tournament.eventType);
        return(<div className="tour-layout" style={{'--accent':_th.accent,'--sidebar-bg':_th.sidebarBg,'--active-bg':_th.activeBg,'--active-nav':_th.activeNav}}>
          <Sidebar tournament={tournament} subview={subview} setSubview={setSubview}
            onDisplay={openDisplayWindow} onSave={saveTournamentNow}
            onExportSave={exportCurrentSave} onExportTemplate={exportCurrentTemplate}
            onReset={resetTournament} onFloor={()=>setShowFloorModal(true)}
            onHome={()=>{clearInterval(timerRef.current);saveT(tournament);setSavedIndex(getIndex());setView('home');}}/>
          <div className="main">
            {subview==='register'&&<RegisterView tournament={tournament} onRegister={addPlayer} onSetMode={setSeatingMode} onAssignSeat={assignSeat} serverInfo={serverInfo}/>}
            {subview==='clock'&&<ClockView tournament={tournament} cur={cur} nxt={nxt} activePlayers={activePlayers} bustedPlayers={bustedPlayers} tablesInUse={tablesInUse} secs={secs} clockCls={clockCls} onToggle={toggleClock} onPrev={prevLevel} onNext={nextLevel} onAdjust={adjustTime} totalEntries={tournament.players.length} onUpdateBlinds={updateCurrentBlinds} onRegisterRandom={()=>{const reg=new Set(tournament.players.map(p=>p.name));for(let i=1;i<=700;i++){const n=String(i).padStart(3,'0');if(!reg.has(n)){addPlayer(n);break;}}}} onBustRandom={()=>{const a=tournament.players.filter(p=>p.status==='active');if(a.length)bustPlayer(a[Math.floor(Math.random()*a.length)].id);}}/>}
            {subview==='players'&&<PlayersView tournament={tournament} activePlayers={activePlayers} bustedPlayers={bustedPlayers} onAdd={addPlayer} onAddMany={addPlayers} onBust={bustPlayer} onBustMany={bustManyPlayers} onRename={updatePlayerName} onRemove={removePlayer} modal={modal} setModal={setModal}/>}
            {subview==='tables'&&<TablesView tournament={tournament} activePlayers={activePlayers} onBalance={balanceTables} onOpen={openTable} onCloseConfirm={closeTableConfirm} onMove={movePlayerSeat} onRemove={removePlayer} onLock={setSeatLock} onRedraw={redrawSeats} onUpdateChipCount={updateChipCount} onExportSeating={exportSeating}/>}
            {subview==='log'&&<LogView activityLog={tournament.activityLog||[]}/>}
            {subview==='blinds'&&<BlindEditView tournament={tournament} onUpdate={updateBlindLevel} onSetChips={setChipsInPlay}/>}
            {subview==='payouts'&&<PayoutsView tournament={tournament} activePlayers={activePlayers} onUpdate={updatePayoutSettings} onPublish={publishPayouts} onUnpublish={unpublishPayouts}/>}
          </div>
        </div>);
      })()}
    </div>
  );
}

/* ==== HOME ==== */
function HomeScreen({onSelect,savedIndex,onResume,onDelete,onExportSave,onExportTemplate,onImport}) {
  const others=[
    {key:'miniRoller',    suit:'♥',color:'#3dba6f',sub:'40-min levels · 27 levels'},
    {key:'mysteryBounty', suit:'◆',color:'#9b7bce',sub:'20-min levels · 18 levels'},
    {key:'satellite',     suit:'♣',color:'#4fa8d4',sub:'10-min levels · 12 levels · No antes'},
  ];
  const flights=[
    {key:'me_1a',label:'Flight 1A',mins:'40 min'},
    {key:'me_1b',label:'Flight 1B',mins:'30 min'},
    {key:'me_1c',label:'Flight 1C',mins:'25 min'},
    {key:'me_1d',label:'Flight 1D',mins:'10 min'},
    {key:'me_d2',label:'Day 2',    mins:'30 min · Lvl 13–32'},
  ];
  return(
    <div className="home">
      <div className="home-inner">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:0}}>
          <div>
            <div className="home-brand">Singapore Poker Championships</div>

          </div>
          <img src={SPC_LOGO} alt="SPC" style={{height:90,objectFit:'contain',opacity:.85,marginTop:4}}/>
        </div>
        {/* ME */}
        <div className="home-section">Main Event</div>
        <div className="event-grid" style={{marginBottom:12}}>
          {flights.slice(0,3).map(f=>(
            <div key={f.key} className="event-card" style={{'--ac':'#c8973a'}} onClick={()=>onSelect(f.key)}>
              <span className="ev-suit" style={{color:'#c8973a'}}>♠</span>
              <div className="ev-name">{f.label}</div>
              <div className="ev-sub">{f.mins} · Levels 1–12</div>
              <div className="ev-meta">Buy-in <strong>S$600</strong> · Stack <strong>25,000</strong></div>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:28}}>
          <div className="event-card" style={{'--ac':'#c8973a'}} onClick={()=>onSelect('me_1d')}>
            <span className="ev-suit" style={{color:'#c8973a'}}>♠</span>

          <div className="event-card" style={{'--ac':'#c8973a'}} onClick={()=>onSelect('me_d2')}>

            <div className="ev-name">Day 2</div>
            <div className="ev-sub">30 min · Levels 13–32</div>

  );
}

/* ==== SETUP ==== */
function SetupScreen({eventType,onBack,onStart}) {
  const cfg=EVENT_CONFIGS[eventType]||EVENT_CONFIGS.miniRoller;
  const isME=cfg.isMainEvent;
  const [name,setName]=useState(_tpl?_tpl.name:`SPC ${cfg.name}`);
  const [buyin,setBuyin]=useState(_tpl?_tpl.buyin:cfg.buyin);
  const [prizeComp,setPrizeComp]=useState(_tpl?_tpl.prizeComponent:cfg.prizeComponent??cfg.buyin);
  const [adminFee,setAdminFee]=useState(_tpl?_tpl.adminFeePercent:cfg.adminFeePercent??4);
  const [guarantee,setGuarantee]=useState(_tpl?_tpl.guarantee:cfg.guarantee??0);
  const [itmPct,setItmPct]=useState(_tpl?_tpl.itmPercent:cfg.itmPercent??15);
  const [bountyAmt,setBountyAmt]=useState(cfg.bountyAmount??0);
  const isMB=eventType==='mysteryBounty';
  const _netPerEntry=prizeComp*(1-adminFee/100); // e.g. 508.80
  const _prizePerEntry=_netPerEntry-(isMB?bountyAmt:0);
  const [stack,setStack]=useState(cfg.stack);
  const [maxTables,setMaxTables]=useState(15);
  const [startTable,setStartTable]=useState(1);
  const [seats,setSeats]=useState(9);
  const _tpl=window._importedTemplate&&window._importedTemplate.eventType===eventType?window._importedTemplate:null;
  useEffect(()=>{ window._importedTemplate=null; },[]);
  const [structure,setStructure]=useState((_tpl&&_tpl.structure?_tpl.structure:STRUCTURES[eventType]||STRUCTURES.miniRoller).map((r,i)=>({...r,_id:i})));
  const [inheritFrom,setInheritFrom]=useState(null); // {entries, busted, name}
  const savedME=isME?getIndex().filter(x=>x.eventType&&x.eventType.startsWith('me_')):[];

  function updRow(idx,field,val){setStructure(s=>s.map((r,i)=>i===idx?{...r,[field]:field==='isBreak'?val:Number(val)}:r));}
  function addLevel(){
    const last=structure.filter(r=>!r.isBreak).slice(-1)[0]||{level:0,sb:1000,bb:2000,ante:2000,mins:30};
    setStructure(s=>[...s,{level:(last.level||0)+1,sb:last.sb*2,bb:last.bb*2,ante:last.ante?last.ante*2:0,mins:last.mins,_id:Math.random()}]);
  }
  function addBreak(){setStructure(s=>[...s,{isBreak:true,mins:15,note:'',_id:Math.random()}]);}
  function removeRow(idx){setStructure(s=>s.filter((_,i)=>i!==idx));}

  return(
    <div className="setup">
      <div className="setup-head">
        <button className="back-btn-small" onClick={onBack}>← Back</button>
        <span className="setup-head-title">Configure — {cfg.name}</span>
        <button className="back-btn-small" style={{marginLeft:'auto',borderColor:'#1a3a22',color:'#3dba6f'}}
          onClick={()=>{
            const tpl={_spcExport:'template',_version:1,name,eventType,buyin,prizeComponent:prizeComp,
              adminFeePercent:adminFee,guarantee,itmPercent:itmPct,stack,maxTables,seatsPerTable:seats,
              structure,bountyAmount:isMB?bountyAmt:0};
            const blob=new Blob([JSON.stringify(tpl,null,2)],{type:'application/json'});
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');
            a.href=url;
            a.download=`spc_template_${name.replace(/[^a-z0-9]/gi,'_').toLowerCase()}.json`;
            a.click();
            URL.revokeObjectURL(url);
          }}>↓ Save as template</button>
      </div>
      <div className="setup-body">
        <div className="setup-left">
          <div className="section-title">Tournament settings</div>
          <div className="form-group"><label className="form-label">Name</label><input className="form-input" value={name} onChange={e=>setName(e.target.value)}/></div>
          <div className="grid-2">
            <div className="form-group"><label className="form-label">Total buy-in (S$)</label><input className="form-input" type="number" value={buyin} onChange={e=>setBuyin(+e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Starting chips</label><input className="form-input" type="number" value={stack} onChange={e=>setStack(+e.target.value)}/></div>
          </div>
          <div className="grid-2">
            <div className="form-group">
              <label className="form-label">Prize component (S$)</label>
              <input className="form-input" type="number" value={prizeComp} onChange={e=>setPrizeComp(+e.target.value)}/>
              <div style={{fontSize:10,color:'#5a8a6a',marginTop:4}}>Buy-in minus entry fee</div>
            </div>
            <div className="form-group">
              <label className="form-label">Admin fee (%)</label>
              <input className="form-input" type="number" value={adminFee} onChange={e=>setAdminFee(+e.target.value)}/>
              <div style={{fontSize:10,color:'#5a8a6a',marginTop:4}}>Deducted from prize pool</div>
            </div>
          </div>
          <div style={{background:'#09140b',border:'1px solid #1a2e22',borderRadius:6,padding:'8px 12px',fontSize:11,color:'#3a5a42',marginBottom:4}}>
            {isMB?(
              <>
                <div>Prize component: <strong style={{color:'#3dba6f'}}>S${prizeComp.toLocaleString()}</strong> − {adminFee}% admin (S${(prizeComp*adminFee/100).toFixed(2)}) = S${_netPerEntry.toFixed(2)} net</div>
                <div style={{marginTop:3}}>→ Bounty pool: <strong style={{color:'#c8973a'}}>S${bountyAmt}/entry</strong> &nbsp;·&nbsp; Prize pool: <strong style={{color:'#9b7bce'}}>S${_prizePerEntry.toFixed(2)}/entry</strong></div>
              </>
            ):(
              <>Prize pool per entry: <strong style={{color:'#3dba6f'}}>S${_prizePerEntry.toFixed(2)}</strong> &nbsp;·&nbsp; {buyin} total − {buyin-prizeComp} fee − {adminFee}% admin</>
            )}
          </div>
          {isMB&&(
            <div className="form-group">
              <label className="form-label">Bounty pool per entry (S$)</label>
              <input className="form-input" type="number" value={bountyAmt} onChange={e=>setBountyAmt(+e.target.value)}/>
            </div>
          )}
          <div className="grid-2">
            <div className="form-group">
              <label className="form-label">Guarantee (S$)</label>
              <input className="form-input" type="number" value={guarantee} onChange={e=>setGuarantee(+e.target.value)}/>
              <div style={{fontSize:10,color:'#2a4a35',marginTop:4}}>0 = no guarantee</div>
            </div>
            <div className="form-group">
              <label className="form-label">ITM %</label>
              <input className="form-input" type="number" value={itmPct} onChange={e=>setItmPct(+e.target.value)}/>
              <div style={{fontSize:10,color:'#2a4a35',marginTop:4}}>% of field paid out</div>
            </div>
          </div>
          <div className="grid-2">
            <div className="form-group"><label className="form-label">First table #</label><input className="form-input" type="number" min="1" max="15" value={startTable} onChange={e=>setStartTable(Math.max(1,+e.target.value))}/></div>
            <div className="form-group"><label className="form-label">Number of tables</label><input className="form-input" type="number" value={maxTables} onChange={e=>setMaxTables(+e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Seats / table</label><input className="form-input" type="number" value={seats} onChange={e=>setSeats(+e.target.value)}/></div>
          </div>
          <div style={{fontSize:11,color:'#2a4a35',marginBottom:4}}>Tables {startTable}–{startTable+maxTables-1} · {maxTables} × {seats} = {maxTables*seats} seats</div>
          {isME&&savedME.length>0&&(
            <div style={{marginBottom:16}}>
              <div className="form-label">Carry forward from previous flight</div>
              <div style={{display:'flex',flexDirection:'column',gap:5,marginTop:6}}>
                <div
                  className={`saved-item${inheritFrom===null?' ':''}`}
                  style={{cursor:'pointer',background:inheritFrom===null?'#112016':'#0b1610',border:`1px solid ${inheritFrom===null?'#3dba6f40':'#152018'}`,borderRadius:6,padding:'7px 11px',fontSize:12,color:inheritFrom===null?'#3dba6f':'#527a5c'}}
                  onClick={()=>setInheritFrom(null)}
                >None — this is the first flight</div>
                {savedME.map(s=>{
                  const t=loadT(s.id);
                  if(!t) return null;
                  const entries=t.players.length+(t.inheritedEntries||0);
                  const busted=t.players.filter(p=>p.status==='busted').length+(t.inheritedBusted||0);
                  const inheritedPrizePool=t.prizePool||0;
                  const sel=inheritFrom&&inheritFrom.id===s.id;
                  return(
                    <div key={s.id}
                      style={{cursor:'pointer',background:sel?'#112016':'#0b1610',border:`1px solid ${sel?'#3dba6f40':'#152018'}`,borderRadius:6,padding:'7px 11px',transition:'.15s'}}
                      onClick={()=>{
                        const activeP=t.players.filter(p=>p.status==='active');
                        const bagged=(t.baggedPlayers||[]);
                        const allForward=[...activeP.map(p=>({name:p.name,chipCount:p.chipCount||0,inheritedChipCount:p.inheritedChipCount||0})),...bagged];
                        setInheritFrom({id:s.id,entries,busted,inheritedPrizePool,name:s.name,activePlayers:allForward,stack:t.stack||0});
                      }}
                    >
                      <div style={{fontSize:12,color:sel?'#3dba6f':'#b2d4ba',fontWeight:500}}>{s.name}</div>
                      <div style={{fontSize:10,color:'#3a5a42',marginTop:1}}>{entries} entries · {busted} busted · {entries-busted} bagged · {fmt.currency(inheritedPrizePool)} prize pool</div>
                    </div>
                  );
                })}
              </div>
              {inheritFrom&&<div style={{marginTop:8,fontSize:11,color:'#3dba6f',background:'#09140b',border:'1px solid #1a2e22',borderRadius:5,padding:'6px 10px'}}>
                ✓ Carrying {inheritFrom.entries} entries + {inheritFrom.busted} busted from {inheritFrom.name}
              </div>}
            </div>
          )}
          <button className="start-btn" onClick={()=>onStart({name,buyin,prizeComponent:prizeComp,adminFeePercent:adminFee,guarantee,itmPercent:itmPct,stack,maxTables,startTable,seatsPerTable:seats,eventType,structure,inheritedEntries:inheritFrom?inheritFrom.entries:0,inheritedBusted:inheritFrom?inheritFrom.busted:0,inheritedPrizePool:inheritFrom?inheritFrom.inheritedPrizePool:0,inheritedPlayers:inheritFrom?inheritFrom.activePlayers:[],inheritedStack:inheritFrom?inheritFrom.stack:0,bountyAmount:isMB?bountyAmt:0})}>Start tournament →</button>
        </div>
        <div className="setup-right">
          <div className="section-title">Blind structure <span style={{fontWeight:400,color:'#2a4a35',fontSize:9}}>— editable</span></div>
          <table className="struct-table">
            <thead><tr><th>Level</th><th>SB</th><th>BB</th><th>Ante</th><th>Mins</th><th>Note</th><th></th></tr></thead>
            <tbody>
              {structure.map((row,i)=>(
                <tr key={row._id??i} className={row.isBreak?'break-row':''}>
                  <td>{row.isBreak?'☕ Break':`Lvl ${row.level}`}</td>
                  <td>{!row.isBreak&&<input className="si" type="number" value={row.sb} onChange={e=>updRow(i,'sb',e.target.value)}/>}</td>
                  <td>{!row.isBreak&&<input className="si" type="number" value={row.bb} onChange={e=>updRow(i,'bb',e.target.value)}/>}</td>
                  <td>{!row.isBreak&&<input className="si" type="number" value={row.ante} onChange={e=>updRow(i,'ante',e.target.value)}/>}</td>
                  <td><input className="si" type="number" value={row.mins} onChange={e=>updRow(i,'mins',e.target.value)} style={{width:42}}/></td>
                  <td>{row.isBreak&&<input className="si" style={{width:90,color:'#c8973a'}} value={row.note||''} onChange={e=>updRow(i,'note',e.target.value)} placeholder="e.g. Colour Up"/>}</td>
                  <td><button className="del-row-btn" onClick={()=>removeRow(i)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{display:'flex',gap:8,marginTop:10}}>
            <button className="add-row-btn" style={{flex:2}} onClick={addLevel}>+ Add level</button>
            <button className="add-row-btn" style={{flex:1}} onClick={addBreak}>+ Break</button>
          </div>
        </div>
      </div>
    </div>
  );
}
